// Convert a UTC ISO string to ET time string "HH:MM"
function utcToET(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleTimeString("en-US", {
    hour12: false, hour: "2-digit", minute: "2-digit",
    timeZone: "America/New_York"
  });
}

// Convert a UTC ISO string to ET date string "YYYY-MM-DD"
function utcToETDate(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleDateString("en-CA", { timeZone: "America/New_York" });
}

function getBaseHours(pkg, sqft) {
  if (!pkg || !sqft) return 0;
  const sf = parseInt(sqft);
  const rules = {
    "Essential – 15 Photos": sf <= 1500 ? 1.0 : 1.5,
    "Standard – 25 Photos": sf <= 1500 ? 1.5 : sf <= 3000 ? 2.0 : 2.5,
    "Premium – 40 Photos + Twilight": sf <= 2000 ? 2.5 : sf <= 4000 ? 3.0 : 3.5,
    "Luxury – 60 Photos + Aerial + Twilight": sf <= 3000 ? 3.5 : sf <= 6000 ? 4.5 : 6.0,
  };
  return rules[pkg] || 0;
}

function calcTotal(pkg, sqft, addons) {
  let total = getBaseHours(pkg, sqft);
  addons.forEach(a => { const m = ADDONS.find(x => x.id === a); if (m) total += m.hrs[pkg] || 0; });
  return Math.round(total * 10) / 10;
}

function fmtHours(h) {
  if (!h) return "—";
  const hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
  return mins === 0 ? `${hrs}h` : `${hrs}h ${mins}m`;
}

function toMins(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function fromMins(m) { const h=Math.floor(m/60),mn=m%60; return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`; }
function slotEnd(start, hrs) { return fromMins(toMins(start)+Math.round(hrs*60)); }
function fmtTime(t) {
  if (!t) return "";
  const [h,m] = t.split(":").map(Number);
  const s=h>=12?"pm":"am", h12=h>12?h-12:h===0?12:h;
  return m===0?`${h12}${s}`:`${h12}:${String(m).padStart(2,"0")}${s}`;
}

async function getDrive(originAddr, destAddr, oZip, dZip) {
  try {
    const url = "/api/drivetime?origin=" + encodeURIComponent(originAddr) + "&destination=" + encodeURIComponent(destAddr);
    const res = await fetch(url);
    const data = await res.json();
    if (data.mins) return data.mins;
  } catch(e) { console.error("Drive time error:", e); }
  return 45;
}

}

      React.createElement("div",null,
        React.createElement(Label,null,"Add-ons (optional)"),
        React.createElement("div",{style:{display:"grid",gap:7}},
          ADDONS.map(a=>{
            const included=(a.id==="Aerial / Drone"&&pkg==="Luxury – 60 Photos + Aerial + Twilight")||(a.id==="Twilight Shoot"&&(pkg==="Premium – 40 Photos + Twilight"||pkg==="Luxury – 60 Photos + Aerial + Twilight"));
            const active=addons.includes(a.id),hrs=a.hrs[pkg]||0;
            return React.createElement("button",{key:a.id,onClick:()=>!included&&toggleAddon(a.id),disabled:included,style:{padding:"10px 13px",border:`1.5px solid ${included?"#bbf7d0":active?"#3b82f6":"#e2e8f0"}`,borderRadius:8,background:included?"#f0fdf4":active?"#eff6ff":"#fff",cursor:included?"default":"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:9}},
                React.createElement("span",{style:{fontSize:15}},a.icon),
                React.createElement("div",{style:{textAlign:"left"}},
                  React.createElement("div",{style:{fontSize:13,fontWeight:600,color:included?"#16a34a":active?"#1d4ed8":"#1e293b"}},a.label),
                  included&&React.createElement("div",{style:{fontSize:11,color:"#16a34a"}},"Included in package")
                )
              ),
              React.createElement("div",{style:{fontSize:12,color:"#64748b"}},included?"✓":pkg&&hrs>0?`+${fmtHours(hrs)}`:"")
            );
          })
        )
      )
    ),

    step===3&&React.createElement("div",{style:{display:"grid",gap:20}},
      React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        [pkgObj?.label,`${parseInt(sqft).toLocaleString()} sqft`,`${fmtHours(total)} shoot`].map(t=>
          React.createElement("div",{key:t,style:{padding:"4px 12px",background:"#f1f5f9",borderRadius:20,fontSize:12,fontWeight:600,color:"#475569"}},t)
        )
      ),
      React.createElement("div",null,
        React.createElement(Label,null,"Select a date *"),
        React.createElement(Input,{value:prefDate,onChange:v=>{setPrefDate(v);setSelectedSlot("");setDriveInfo(null);},type:"date",style:{maxWidth:220}})
      ),
      driveInfo&&React.createElement("div",{style:{padding:"10px 14px",background:driveInfo.mins<=20?"#f0fdf4":driveInfo.mins<=40?"#fffbeb":"#fef2f2",border:`1.5px solid ${driveInfo.mins<=20?"#bbf7d0":driveInfo.mins<=40?"#fde68a":"#fecaca"}`,borderRadius:9,fontSize:12}},
        React.createElement("div",{style:{fontWeight:700,color:driveInfo.mins<=20?"#16a34a":driveInfo.mins<=40?"#d97706":"#dc2626",fontSize:13,marginBottom:4}},`🚗 ${driveInfo.mins} min drive buffer`),
        React.createElement("div",{style:{color:"#64748b"}},`From prior shoot: `,React.createElement("span",{style:{fontWeight:500,color:"#374151"}},driveInfo.from)),
        React.createElement("div",{style:{color:"#94a3b8",fontSize:11,marginTop:3}},"Includes 15 min buffer · slots already adjusted")
      ),
      React.createElement("div",null,
        React.createElement(Label,null,"Available times *"),
        loading?React.createElement("div",{style:{padding:"20px 0",textAlign:"center"}},
          React.createElement("div",{style:{width:28,height:28,border:"3px solid #e2e8f0",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 8px"}}),
          React.createElement("div",{style:{fontSize:13,color:"#64748b"}},"Checking Jesse's calendar…")
        ):!availSlots?React.createElement("div",{style:{padding:16,textAlign:"center",color:"#94a3b8",fontSize:13}},"Pick a date above to see available times")
        :availSlots.length===0?React.createElement("div",{style:{padding:20,textAlign:"center",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:10}},
          React.createElement("div",{style:{fontSize:22,marginBottom:8}},"😔"),
          React.createElement("div",{style:{fontSize:14,fontWeight:600,color:"#991b1b"}},"No available slots this day"),
          React.createElement("div",{style:{fontSize:12,color:"#b91c1c",marginTop:4}},"Jesse is fully booked. Try another date.")
        ):React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}},
          availSlots.map(s=>{
            const end=slotEnd(s.id,total),active=selectedSlot===s.id;
            return React.createElement("button",{key:s.id,onClick:()=>setSelectedSlot(s.id),style:{padding:"10px 8px",border:`2px solid ${active?"#1e40af":"#e2e8f0"}`,borderRadius:9,background:active?"#eff6ff":"#fff",cursor:"pointer",textAlign:"center"}},
              React.createElement("div",{style:{fontSize:14,fontWeight:700,color:active?"#1d4ed8":"#1e293b"}},s.label),
              React.createElement("div",{style:{fontSize:11,color:"#94a3b8",marginTop:2}},`ends ${fmtTime(end)}`)
            );
          })
        )
      ),
      React.createElement("div",{style:{padding:"10px 14px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,fontSize:12,color:"#1e40af"}},
        "📅 Synced from Jesse's Google Calendar — updates every hour automatically"
      )
    ),

    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:28,paddingTop:20,borderTop:"1px solid #f1f5f9"}},
      step>1?React.createElement("button",{onClick:()=>setStep(s=>s-1),style:{padding:"10px 20px",background:"none",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:600,color:"#475569",cursor:"pointer"}},"← Back"):React.createElement("div"),
      step<3?React.createElement("button",{onClick:()=>setStep(s=>s+1),disabled:step===1?!s1ok:!s2ok,style:{padding:"10px 24px",background:(step===1?s1ok:s2ok)?"#1e40af":"#e2e8f0",color:(step===1?s1ok:s2ok)?"#fff":"#94a3b8",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:(step===1?s1ok:s2ok)?"pointer":"not-allowed"}},"Continue →")
      :React.createElement("button",{onClick:handleSubmit,disabled:!s3ok,style:{padding:"12px 28px",background:s3ok?"#16a34a":"#e2e8f0",color:s3ok?"#fff":"#94a3b8",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:s3ok?"pointer":"not-allowed"}},"📸 Submit shoot request")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
